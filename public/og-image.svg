<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Aarav Kashyap Singh - AI Engineer</title>
  <desc id="desc">Open Graph preview image for Aarav Kashyap Singh portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#080808"/>
      <stop offset="0.58" stop-color="#11110f"/>
      <stop offset="1" stop-color="#1a1a16"/>
    </linearGradient>
    <pattern id="lines" width="1200" height="90" patternUnits="userSpaceOnUse">
      <path d="M0 42 C160 18 320 66 480 42 S800 18 960 42 1120 66 1200 42" fill="none" stroke="#f4f0e7" stroke-opacity=".08" stroke-width="3"/>
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#lines)"/>
  <circle cx="1020" cy="120" r="160" fill="#c9dc7d" opacity=".13" filter="url(#softGlow)"/>
  <g fill="#f4f0e7" font-family="Inter, Arial, sans-serif">
    <text x="92" y="112" font-size="24" font-weight="700" letter-spacing="8" opacity=".68">AI ENGINEER / FULL STACK DEVELOPER</text>
    <text x="88" y="270" font-size="106" font-weight="900" letter-spacing="-4">AARAV</text>
    <text x="88" y="386" font-size="106" font-weight="900" letter-spacing="-4">KASHYAP</text>
    <text x="88" y="500" font-size="98" font-weight="200" letter-spacing="-2" opacity=".62">SINGH</text>
    <text x="92" y="560" font-size="28" font-weight="500" opacity=".72">Building AI systems, backend workflows, and useful full-stack products.</text>
  </g>
  <g transform="translate(910 430)">
    <rect x="0" y="0" width="220" height="64" rx="32" fill="#c9dc7d"/>
    <text x="110" y="40" text-anchor="middle" fill="#0b0b0a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="5">OPEN TO WORK</text>
  </g>
</svg>
